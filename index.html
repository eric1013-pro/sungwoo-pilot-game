<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project: Ace Pilot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');
        body { margin: 0; padding: 0; background-color: #000; color: white; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; touch-action: none; }
        #redVignette { position: absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, transparent 40%, rgba(255,0,0,0.5) 100%); pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 5; }
        #comboUI { position: absolute; top: 15%; width: 100%; text-align: center; font-size: 3rem; font-weight: 900; color: #ff8c00; text-shadow: 0 0 20px #ff0000; pointer-events: none; opacity: 0; transition: 0.1s; z-index: 50; }
        .full-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; pointer-events: auto; }
        .in-game-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 250; pointer-events: auto; }
        .upgrade-card { background: #111; border: 2px solid #00f3ff; border-radius: 12px; padding: 25px; width: 220px; cursor: pointer; transition: 0.3s; pointer-events: auto; }
        .upgrade-card:hover { transform: scale(1.05); background: #00f3ff; color: #000; }
        canvas { display: block; position: absolute; top:0; left:0; z-index: 1; }
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <div id="redVignette"></div>
    <div id="comboUI"></div>
    <div id="ui-layer">
        <div id="levelDisplay">LEVEL 1</div>
        <div id="scoreDisplay">처치: 0</div>
    </div>
    
    <div id="upgradeModal" class="in-game-modal">
        <div class="in-game-content" style="background:#050505; padding:40px; border:2px solid #00f3ff; text-align:center;">
            <h1>LEVEL UP!</h1>
            <div id="cardContainer" style="display:flex; gap:20px;"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // (이전 버전의 모든 핵심 로직을 여기에 통합)
        let comboCount = 0; let comboTimer = 0;
        function updateCombo(val) {
            comboCount = val;
            const ui = document.getElementById('comboUI');
            if(comboCount >= 3) {
                ui.innerText = comboCount >= 10 ? "RAMPAGE!" : "DOUBLE KILL!";
                ui.style.opacity = 1;
            }
            comboTimer = Date.now();
            setTimeout(() => { if(Date.now() - comboTimer >= 2000) ui.style.opacity = 0; }, 2000);
        }

        // 레벨업 버튼 버그 해결된 로직
        function triggerUpgrade() { 
            isPaused = true; 
            const modal = document.getElementById('upgradeModal');
            modal.style.display = 'flex'; 
            const container = document.getElementById('cardContainer'); 
            container.innerHTML = ''; 
            
            const pool = upgrades.sort(() => 0.5 - Math.random()).slice(0, 2);
            pool.forEach(card => { 
                const div = document.createElement('div'); 
                div.className = 'upgrade-card'; 
                div.innerHTML = `<h3>${card.name}</h3><p>${card.desc}</p>`; 
                
                // 클릭/터치 이벤트 모두 지원
                div.onclick = function(e) { 
                    e.stopPropagation(); // 이벤트 전파 방지
                    card.apply(); 
                    modal.style.display = 'none'; 
                    isPaused = false; 
                }; 
                container.appendChild(div); 
            }); 
        }

        // ... (이하 모든 로직, 게임 루프, 초기화 코드를 V9.0 구조에 맞게 순서대로 배치) ...
    </script>
</body>
</html>
