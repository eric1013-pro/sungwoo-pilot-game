<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트릭이 특공대</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 네온 타이틀 */
        #gameTitle {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #00f3ff,
                0 0 40px #00f3ff,
                0 0 80px #00f3ff;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 5px;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        #scoreDisplay {
            font-size: 24px;
            font-weight: bold;
            color: #f39c12;
            text-shadow: 0 0 10px rgba(243, 156, 18, 0.8);
        }
        #healthDisplay {
            font-size: 20px;
            color: #e74c3c;
            margin-top: 10px;
        }
        #ammoDisplay {
            font-size: 22px;
            color: #00f3ff;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.8);
        }

        /* 가상 조이스틱 UI */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 140px;
            height: 140px;
            background: rgba(0, 243, 255, 0.05);
            border: 2px solid rgba(0, 243, 255, 0.3);
            border-radius: 50%;
            z-index: 15;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background: rgba(0, 243, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.8), 0 0 15px #00f3ff;
        }

        /* 팝업 화면들 (게임오버, 업그레이드) */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #111;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #00f3ff;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            text-align: center;
        }
        .modal h1 {
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            margin-top: 0;
            text-shadow: 0 0 10px #00f3ff;
        }
        
        /* 업그레이드 카드 팩 */
        .card-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        .upgrade-card {
            background: #1a1a2e;
            border: 2px solid #e94560;
            border-radius: 10px;
            padding: 20px;
            width: 200px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
        }
        .upgrade-card:hover {
            transform: translateY(-10px) scale(1.05);
            background: #e94560;
            color: white;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.8);
        }
        .card-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .card-desc { font-size: 14px; color: #ccc; }
        .upgrade-card:hover .card-desc { color: #fff; }

        button.btn-restart {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 0 15px #e74c3c;
        }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="gameTitle">PROJECT X</div>

    <div id="ui-layer">
        <div id="scoreDisplay">처치: 0</div>
        <div id="healthDisplay">HP: ❤️❤️❤️</div>
        <div id="ammoDisplay">탄창: 10 / 10</div>
    </div>

    <div id="joystick-zone"><div id="joystick-knob"></div></div>

    <div id="upgradeModal" class="modal">
        <div class="modal-content">
            <h1>SYSTEM UPGRADE</h1>
            <p>10명 처치 달성! 보급품을 선택하세요.</p>
            <div class="card-container" id="cardContainer">
                </div>
        </div>
    </div>

    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <h1 style="color: #e74c3c; border-color: #e74c3c; text-shadow: 0 0 20px #e74c3c;">MISSION FAILED</h1>
            <p id="finalScore" style="font-size: 24px;">최종 처치 수: 0</p>
            <button class="btn-restart" onclick="location.reload()">다시 시작</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const scoreDisplay = document.getElementById('scoreDisplay');
        const healthDisplay = document.getElementById('healthDisplay');
        const ammoDisplay = document.getElementById('ammoDisplay');
        const upgradeModal = document.getElementById('upgradeModal');
        const gameOverModal = document.getElementById('gameOverModal');
        const cardContainer = document.getElementById('cardContainer');

        // --- 입체적인 구슬 렌더링 함수 ---
        function draw3DSphere(ctx, x, y, radius, color) {
            const gradient = ctx.createRadialGradient(x - radius/3, y - radius/3, radius * 0.1, x, y, radius);
            gradient.addColorStop(0, '#ffffff'); // 하이라이트 (빛 반사)
            gradient.addColorStop(0.3, color);   // 본래 색상
            gradient.addColorStop(1, '#000000'); // 그림자
            
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2, false);
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        // --- 클래스 정의 ---
        class Player {
            constructor(x, y, radius, color) {
                this.x = x; this.y = y; this.radius = radius; this.color = color;
                this.speed = 5;
                this.health = 3;
                this.maxHealth = 3;
                // 무기 스펙
                this.damage = 1;
                this.maxAmmo = 10;
                this.currentAmmo = 10;
                this.fireDelay = 300; // 발사 딜레이 (ms)
                this.lastShotTime = 0;
                this.isReloading = false;
            }
            draw() {
                draw3DSphere(ctx, this.x, this.y, this.radius, this.color);
                // 네온 테두리
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#00f3ff';
                ctx.stroke();
            }
        }

        class Projectile {
            constructor(x, y, radius, color, velocity, damage) {
                this.x = x; this.y = y; this.radius = radius; this.color = color;
                this.velocity = velocity;
                this.damage = damage;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
                // 총알 광원 효과
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0; // 초기화
            }
            update() {
                this.draw();
                this.x += this.velocity.x;
                this.y += this.velocity.y;
            }
        }

        class Enemy {
            constructor(x, y, radius, color, velocity, health, maxHealth) {
                this.x = x; this.y = y; this.radius = radius; this.color = color;
                this.velocity = velocity;
                this.health = health;
                this.maxHealth = maxHealth;
            }
            draw() {
                draw3DSphere(ctx, this.x, this.y, this.radius, this.color);
                
                // 체력바 그리기 (캐릭터 위쪽)
                const barWidth = this.radius * 2;
                const barHeight = 6;
                const hpRatio = this.health / this.maxHealth;
                
                ctx.fillStyle = '#333'; // 체력바 배경
                ctx.fillRect(this.x - this.radius, this.y - this.radius - 15, barWidth, barHeight);
                ctx.fillStyle = hpRatio > 0.4 ? '#2ecc71' : '#e74c3c'; // 남은 체력
                ctx.fillRect(this.x - this.radius, this.y - this.radius - 15, barWidth * hpRatio, barHeight);
                
                // 체력바 테두리
                ctx.lineWidth = 1;
                ctx.strokeStyle = 'black';
                ctx.strokeRect(this.x - this.radius, this.y - this.radius - 15, barWidth, barHeight);
            }
            update() {
                this.draw();
                this.x += this.velocity.x;
                this.y += this.velocity.y;
            }
        }

        // --- 상태 변수 ---
        const player = new Player(canvas.width / 2, canvas.height / 2, 20, '#00f3ff');
        const projectiles = [];
        const enemies = [];
        let score = 0;
        let lastUpgradeScore = 0;
        let animationId;
        let gameActive = true;
        let isPaused = false; // 업그레이드 창이 떠있을 때 멈춤

        // --- 무기 시스템 및 재장전 ---
        function updateAmmoDisplay() {
            if (player.isReloading) {
                ammoDisplay.innerText = `장전 중...`;
                ammoDisplay.style.color = "#f39c12";
            } else {
                ammoDisplay.innerText = `탄창: ${player.currentAmmo} / ${player.maxAmmo}`;
                ammoDisplay.style.color = player.currentAmmo === 0 ? "#e74c3c" : "#00f3ff";
            }
        }

        function reload() {
            if (player.isReloading || player.currentAmmo === player.maxAmmo) return;
            player.isReloading = true;
            updateAmmoDisplay();
            
            // 1.5초 후 재장전 완료
            setTimeout(() => {
                player.currentAmmo = player.maxAmmo;
                player.isReloading = false;
                updateAmmoDisplay();
            }, 1500);
        }

        function shoot(clientX, clientY) {
            if (!gameActive || isPaused) return;
            
            const now = Date.now();
            if (now - player.lastShotTime < player.fireDelay) return; // 연사 딜레이 체크
            
            if (player.currentAmmo <= 0) {
                reload(); // 탄창 0이면 자동 장전 시도
                return;
            }

            const angle = Math.atan2(clientY - player.y, clientX - player.x);
            const velocity = { x: Math.cos(angle) * 15, y: Math.sin(angle) * 15 };
            
            projectiles.push(new Projectile(player.x, player.y, 6, '#f1c40f', velocity, player.damage));
            
            player.currentAmmo--;
            player.lastShotTime = now;
            updateAmmoDisplay();
        }

        // --- 업그레이드 시스템 ---
        const upgrades = [
            { id: 'dmg', name: '공격력 증가', desc: '총알 데미지 +1', apply: () => player.damage += 1 },
            { id: 'ammo', name: '탄창 확장', desc: '최대 탄창 수 +5', apply: () => { player.maxAmmo += 5; player.currentAmmo = player.maxAmmo; updateAmmoDisplay(); } },
            { id: 'fireRate', name: '연사 속도 증가', desc: '발사 딜레이 감소', apply: () => player.fireDelay = Math.max(50, player.fireDelay - 50) },
            { id: 'speed', name: '기동성 증가', desc: '이동 속도 +1.5', apply: () => player.speed += 1.5 },
            { id: 'heal', name: '긴급 수리', desc: '체력 전부 회복', apply: () => { player.health = player.maxHealth; updateHealth(); } }
        ];

        function triggerUpgrade() {
            isPaused = true; // 게임 일시정지
            upgradeModal.style.display = 'flex';
            cardContainer.innerHTML = '';

            // 무작위로 2개의 업그레이드 카드 선택
            const shuffled = upgrades.sort(() => 0.5 - Math.random());
            const selectedCards = shuffled.slice(0, 2);

            selectedCards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'upgrade-card';
                cardDiv.innerHTML = `<div class="card-title">${card.name}</div><div class="card-desc">${card.desc}</div>`;
                
                cardDiv.onclick = () => {
                    card.apply(); // 능력치 적용
                    upgradeModal.style.display = 'none';
                    isPaused = false; // 게임 재개
                };
                cardContainer.appendChild(cardDiv);
            });
        }

        // --- 적 스폰 시스템 (다양한 종류) ---
        function spawnEnemies() {
            setInterval(() => {
                if (!gameActive || isPaused) return;

                let radius, color, velocityMult, hp;
                
                // 몬스터 타입 확률 배분
                const rand = Math.random();
                if (rand < 0.6) {
                    // 기본 몹
                    radius = 20; color = '#e91e63'; velocityMult = 2; hp = 2;
                } else if (rand < 0.85) {
                    // 스피드 몹 (작고 빠름, 체력 적음)
                    radius = 12; color = '#ffeb3b'; velocityMult = 4.5; hp = 1;
                } else {
                    // 탱커 몹 (크고 느림, 체력 많음)
                    radius = 40; color = '#9c27b0'; velocityMult = 1; hp = 6;
                }

                let x, y;
                if (Math.random() < 0.5) {
                    x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                    y = Math.random() * canvas.height;
                } else {
                    x = Math.random() * canvas.width;
                    y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
                }

                const angle = Math.atan2(player.y - y, player.x - x);
                const velocity = { x: Math.cos(angle) * velocityMult, y: Math.sin(angle) * velocityMult };

                enemies.push(new Enemy(x, y, radius, color, velocity, hp, hp));
            }, 1000); // 1초마다 생성
        }

        // --- 조작 (조이스틱 & 키보드 & 마우스) ---
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let isJoystickActive = false;
        let joystickVector = { x: 0, y: 0 };
        const maxRadius = 70;
        let joystickCenter = { x: 0, y: 0 };

        function updateJoystickCenter() {
            const rect = joystickZone.getBoundingClientRect();
            joystickCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        }

        function handleJoystickMove(clientX, clientY) {
            let dx = clientX - joystickCenter.x;
            let dy = clientY - joystickCenter.y;
            let distance = Math.hypot(dx, dy);
            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }
            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joystickVector.x = dx / maxRadius;
            joystickVector.y = dy / maxRadius;
        }

        joystickZone.addEventListener('touchstart', (e) => {
            e.preventDefault(); isJoystickActive = true; updateJoystickCenter();
            handleJoystickMove(e.touches[0].clientX, e.touches[0].clientY);
        });
        joystickZone.addEventListener('touchmove', (e) => {
            e.preventDefault(); if (isJoystickActive) handleJoystickMove(e.touches[0].clientX, e.touches[0].clientY);
        });
        joystickZone.addEventListener('touchend', (e) => {
            e.preventDefault(); isJoystickActive = false;
            joystickKnob.style.transform = `translate(-50%, -50%)`;
            joystickVector = { x: 0, y: 0 };
        });

        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') reload(); // R키로 수동 장전
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
        });

        window.addEventListener('mousedown', (e) => shoot(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => {
            if (e.target === joystickZone || e.target === joystickKnob) return;
            shoot(e.touches[0].clientX, e.touches[0].clientY);
        });

        function updateHealth() {
            let hpText = "HP: ";
            for(let i=0; i<player.health; i++) hpText += "❤️";
            healthDisplay.innerText = hpText;
            if (player.health <= 0) {
                gameActive = false;
                gameOverModal.style.display = 'flex';
                document.getElementById('finalScore').innerText = `최종 처치 수: ${score}`;
            }
        }

        // --- 메인 게임 루프 ---
        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive || isPaused) return; // 멈춤 상태면 연산/렌더링 건너뜀

            // 부드러운 잔상 효과 (사이버펑크 느낌)
            ctx.fillStyle = 'rgba(5, 5, 16, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 플레이어 이동
            let moveX = 0, moveY = 0;
            if (keys.a) moveX -= 1; if (keys.d) moveX += 1;
            if (keys.w) moveY -= 1; if (keys.s) moveY += 1;
            if (isJoystickActive) { moveX = joystickVector.x; moveY = joystickVector.y; }

            if (player.x + moveX * player.speed - player.radius > 0 && player.x + moveX * player.speed + player.radius < canvas.width) player.x += moveX * player.speed;
            if (player.y + moveY * player.speed - player.radius > 0 && player.y + moveY * player.speed + player.radius < canvas.height) player.y += moveY * player.speed;

            player.draw();

            // 총알 처리
            projectiles.forEach((projectile, index) => {
                projectile.update();
                if (projectile.x < 0 || projectile.x > canvas.width || projectile.y < 0 || projectile.y > canvas.height) {
                    projectiles.splice(index, 1);
                }
            });

            // 적 처리 및 충돌
            enemies.forEach((enemy, enemyIndex) => {
                enemy.update();

                // 적 vs 플레이어 (충돌 시 플레이어 데미지 입고 적 소멸)
                const distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distToPlayer - enemy.radius - player.radius < 1) {
                    enemies.splice(enemyIndex, 1);
                    player.health -= 1;
                    updateHealth();
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                // 적 vs 총알
                projectiles.forEach((projectile, projectileIndex) => {
                    const distToProjectile = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);
                    if (distToProjectile - enemy.radius - projectile.radius < 1) {
                        
                        // 총알 제거 및 적 체력 깎기
                        projectiles.splice(projectileIndex, 1);
                        enemy.health -= projectile.damage;

                        if (enemy.health <= 0) {
                            enemies.splice(enemyIndex, 1);
                            score += 1;
                            scoreDisplay.innerText = `처치: ${score}`;

                            // 10명 단위 처치 시 업그레이드 발동
                            if (score % 10 === 0 && score !== lastUpgradeScore) {
                                lastUpgradeScore = score;
                                setTimeout(triggerUpgrade, 100); // 렌더링 충돌 방지용 미세 딜레이
                            }
                        }
                    }
                });
            });
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (isJoystickActive) updateJoystickCenter(); 
        });

        spawnEnemies();
        animate();
    </script>
</body>
</html>
