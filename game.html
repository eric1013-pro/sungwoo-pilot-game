<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>트릭이 파일럿 만들기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&family=Orbitron:wght@700;900&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: #030a12;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 🎬 제작사 인트로 화면 */
        #studioIntro {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 200;
            transition: opacity 1s ease-out;
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 5px;
            animation: glitchReveal 2s ease-in-out;
        }
        .t-white { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .t-e { color: #00f3ff; text-shadow: 0 0 20px #00f3ff, 0 0 40px #00f3ff; display: inline-block; margin-right: 5px; }
        .t-3 { color: #00ff88; text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88; display: inline-block; margin-left: 5px; }
        
        @keyframes glitchReveal {
            0% { opacity: 0; transform: scale(0.8); filter: blur(10px); }
            50% { opacity: 1; transform: scale(1.05); filter: blur(0px); }
            100% { transform: scale(1); }
        }

        /* 🌌 메인 인트로 화면 (블루 & 그린 계열) */
        #introScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a2342 0%, #030a12 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        
        /* ✨ 게임 속으로 빨려 들어가는 워프 효과 */
        .warp-active {
            animation: warpIn 1.2s cubic-bezier(0.7, 0, 0.3, 1) forwards !important;
        }
        @keyframes warpIn {
            0% { transform: scale(1); filter: blur(0px); opacity: 1; }
            40% { filter: blur(5px); opacity: 0.8; }
            100% { transform: scale(15); filter: blur(30px); opacity: 0; }
        }

        /* 💰 자발적 후원 문구 (깜빡임 효과) */
        .donation-text {
            position: absolute; top: 30px; left: 50%;
            transform: translateX(-50%);
            color: #00ff88;
            font-size: 1.1rem;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
            animation: fastBlink 1s infinite;
            width: 100%; text-align: center;
        }
        @keyframes fastBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .intro-title {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            font-size: 4.5rem;
            color: #00f3ff;
            text-shadow: 0 0 10px #00f3ff, 0 0 30px #00f3ff, 0 0 50px #00ff88;
            margin-bottom: 50px;
            animation: floatTitle 3s ease-in-out infinite;
        }
        @keyframes floatTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .btn-enter {
            background: transparent;
            color: #00ff88;
            font-size: 1.6rem;
            font-weight: 900;
            padding: 15px 60px;
            border: 3px solid #00ff88;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4), inset 0 0 15px rgba(0, 255, 136, 0.2);
            transition: 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
            text-transform: uppercase;
        }
        .btn-enter:hover { background: #00ff88; color: #000; box-shadow: 0 0 40px #00ff88; }
        .btn-enter:active { transform: scale(0.95); }

        /* UI 레이어 */
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; display: none; }
        #scoreDisplay { font-size: 26px; font-weight: 900; color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.8); }
        #healthDisplay { font-size: 22px; color: #ff0055; margin-top: 10px; }
        #ammoDisplay { font-size: 22px; color: #00f3ff; font-weight: bold; margin-top: 10px; text-shadow: 0 0 10px rgba(0, 243, 255, 0.8); }

        #bossWarning {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            font-size: 3.5rem; font-weight: 900; color: #ff0055;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055;
            display: none; z-index: 20; animation: blink 0.5s infinite;
        }

        /* 모바일 트윈 조이스틱 */
        .joystick-zone {
            position: absolute; bottom: 40px; width: 130px; height: 130px;
            background: rgba(0, 243, 255, 0.05); border: 2px solid rgba(0, 243, 255, 0.2);
            border-radius: 50%; z-index: 15; display: none;
        }
        #joystick-left { left: 40px; }
        #joystick-right { right: 40px; border-color: rgba(0, 255, 136, 0.3); }
        .joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        #knob-left { background: rgba(0, 243, 255, 0.6); box-shadow: 0 0 15px #00f3ff; }
        #knob-right { background: rgba(0, 255, 136, 0.6); box-shadow: 0 0 15px #00ff88; }

        /* 팝업 모달 */
        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 15, 0.85); backdrop-filter: blur(5px);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 30;
        }
        .modal-content {
            background: #030a12; padding: 40px; border-radius: 15px; border: 2px solid #00f3ff;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.3); text-align: center;
        }
        .modal h1 { color: #00f3ff; font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin-top: 0; text-shadow: 0 0 15px #00f3ff; }
        
        .card-container { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .upgrade-card {
            background: #0a1526; border: 2px solid #00ff88; border-radius: 10px; padding: 20px;
            width: 180px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }
        .upgrade-card:hover { transform: translateY(-10px); background: #00ff88; color: #000; box-shadow: 0 0 30px #00ff88; }
        .card-title { font-size: 20px; font-weight: 900; margin-bottom: 10px; }
        .card-desc { font-size: 14px; color: #ccc; }
        .upgrade-card:hover .card-desc { color: #111; }

        canvas { display: block; }
        
        @media (min-width: 800px) {
            .joystick-zone { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- 🎬 제작사 인트로 -->
    <div id="studioIntro">
        <div class="logo-text">
            <span class="t-white">THR</span><span class="t-e">E</span><span class="t-3">3</span><span class="t-white">RIC</span>
        </div>
    </div>

    <!-- 🌌 메인 화면 -->
    <div id="introScreen" style="display: none;">
        <div class="donation-text">트릭이의 계좌로 자발적 후원을 해주세요 9003259257108 새마을 금고</div>
        <div class="intro-title">트릭이 키우기</div>
        <button class="btn-enter" onclick="triggerWarp()">START GAME</button>
    </div>

    <!-- 🎮 게임 UI -->
    <div id="ui-layer">
        <div id="scoreDisplay">처치: 0</div>
        <div id="healthDisplay">HP: ❤️❤️❤️</div>
        <div id="ammoDisplay">탄창: 10 / 10</div>
    </div>
    
    <div id="bossWarning">⚠️ 보스몹 등장 ⚠️</div>

    <div id="joystick-left" class="joystick-zone"><div id="knob-left" class="joystick-knob"></div></div>
    <div id="joystick-right" class="joystick-zone"><div id="knob-right" class="joystick-knob"></div></div>

    <!-- 업그레이드 모달 -->
    <div id="upgradeModal" class="modal">
        <div class="modal-content">
            <h1>SYSTEM UPGRADE</h1>
            <p style="color: #ccc;">적들이 더욱 강해집니다. 파츠를 선택하세요.</p>
            <div class="card-container" id="cardContainer"></div>
        </div>
    </div>

    <!-- 게임 오버 모달 -->
    <div id="gameOverModal" class="modal">
        <div class="modal-content" style="border-color: #ff0055; box-shadow: 0 0 40px rgba(255, 0, 85, 0.4);">
            <h1 style="color: #ff0055; text-shadow: 0 0 20px #ff0055;">RESPAWN?</h1>
            <p id="finalScore" style="font-size: 24px; color: #fff;">최종 처치 수: 0</p>
            <button class="btn-enter" onclick="location.reload()" style="margin-top:20px; font-size: 1.2rem; border-color:#ff0055; color:#ff0055; box-shadow: 0 0 20px rgba(255,0,85,0.4);">재도전</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- 인트로 시퀀스 ---
        window.onload = () => {
            setTimeout(() => {
                const studio = document.getElementById('studioIntro');
                studio.style.opacity = '0';
                setTimeout(() => {
                    studio.style.display = 'none';
                    document.getElementById('introScreen').style.display = 'flex';
                }, 1000);
            }, 2500); // 2.5초간 로고 보여줌
        };

        // 워프 이펙트 및 게임 시작
        function triggerWarp() {
            const intro = document.getElementById('introScreen');
            intro.classList.add('warp-active');
            
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('ui-layer').style.display = 'block';
                if(window.innerWidth < 800) {
                    document.getElementById('joystick-left').style.display = 'block';
                    document.getElementById('joystick-right').style.display = 'block';
                }
                startGame();
            }, 1000); // 워프 애니메이션 끝날 때쯤 게임 시작
        }

        // --- 전역 변수 ---
        let score = 0, lastUpgradeScore = 0, lastBossScore = 0;
        let difficultyMultiplier = 1.0;
        let gameActive = false, isPaused = false, animationId;

        // --- 폴리곤 그리기 함수 ---
        function drawPolygon(ctx, x, y, radius, sides, color, rotation) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(rotation);
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const angle = (i * 2 * Math.PI) / sides;
                ctx.lineTo(radius * Math.cos(angle), radius * Math.sin(angle));
            }
            ctx.closePath();
            ctx.fillStyle = color; ctx.shadowBlur = 15; ctx.shadowColor = color; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
            ctx.restore();
        }

        // --- 🚀 직관적인 전투기 디자인 캐릭터 ---
        class Player {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = 20;
                this.speed = 6; this.health = 3; this.maxHealth = 3;
                this.damage = 1; this.maxAmmo = 10; this.currentAmmo = 10;
                this.fireDelay = 200; this.lastShotTime = 0; this.isReloading = false;
                this.angle = 0; // 바라보는 방향
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // 전투기 본체 (화살표 모양)
                ctx.beginPath();
                ctx.moveTo(this.radius * 1.2, 0); // 코 (Nose)
                ctx.lineTo(-this.radius * 0.8, this.radius * 0.8); // 우측 날개
                ctx.lineTo(-this.radius * 0.3, 0); // 꼬리 중앙
                ctx.lineTo(-this.radius * 0.8, -this.radius * 0.8); // 좌측 날개
                ctx.closePath();

                ctx.fillStyle = '#0a1526';
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#00f3ff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00f3ff';
                ctx.stroke();

                // 중앙 코어 엔진
                ctx.beginPath();
                ctx.arc(-this.radius * 0.1, 0, this.radius * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = '#00ff88';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ff88';
                ctx.fill();

                ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y, velocity, damage) {
                this.x = x; this.y = y; this.radius = 6;
                this.velocity = velocity; this.damage = damage;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ff88';
                ctx.fill();
            }
            update() { this.draw(); this.x += this.velocity.x; this.y += this.velocity.y; }
        }

        class Enemy {
            constructor(x, y, radius, color, velocity, health, type, isBoss = false) {
                this.x = x; this.y = y; this.radius = radius; this.color = color;
                this.velocity = velocity; this.health = health; this.maxHealth = health;
                this.type = type; this.isBoss = isBoss; this.rotation = 0;
            }
            draw() {
                this.rotation += 0.02; 
                if(this.isBoss) drawPolygon(ctx, this.x, this.y, this.radius, 8, this.color, -this.rotation); 
                else if(this.type === 'fast') drawPolygon(ctx, this.x, this.y, this.radius, 3, this.color, this.rotation); 
                else if(this.type === 'tank') drawPolygon(ctx, this.x, this.y, this.radius, 6, this.color, this.rotation); 
                else drawPolygon(ctx, this.x, this.y, this.radius, 4, this.color, this.rotation); 
                
                const barW = this.radius * 2; const barH = this.isBoss ? 10 : 6;
                const hpRatio = this.health / this.maxHealth;
                ctx.fillStyle = '#333'; ctx.fillRect(this.x - this.radius, this.y - this.radius - 20, barW, barH);
                ctx.fillStyle = hpRatio > 0.4 ? '#00f3ff' : '#ff0055';
                ctx.fillRect(this.x - this.radius, this.y - this.radius - 20, barW * hpRatio, barH);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(this.x - this.radius, this.y - this.radius - 20, barW, barH);
            }
            update() { this.draw(); this.x += this.velocity.x; this.y += this.velocity.y; }
        }

        const player = new Player(canvas.width / 2, canvas.height / 2);
        const projectiles = [];
        const enemies = [];

        // --- 무기 & 시스템 ---
        function updateAmmoDisplay() {
            const display = document.getElementById('ammoDisplay');
            if (player.isReloading) { display.innerText = `장전 중...`; display.style.color = "#ff8c00"; }
            else { display.innerText = `탄창: ${player.currentAmmo} / ${player.maxAmmo}`; display.style.color = player.currentAmmo === 0 ? "#ff0055" : "#00f3ff"; }
        }

        function reload() {
            if (player.isReloading || player.currentAmmo === player.maxAmmo) return;
            player.isReloading = true; updateAmmoDisplay();
            setTimeout(() => { player.currentAmmo = player.maxAmmo; player.isReloading = false; updateAmmoDisplay(); }, 1200);
        }

        function shoot() {
            if (!gameActive || isPaused) return;
            const now = Date.now();
            if (now - player.lastShotTime < player.fireDelay) return;
            if (player.currentAmmo <= 0) { reload(); return; }

            const velocity = { x: Math.cos(player.angle) * 20, y: Math.sin(player.angle) * 20 };
            projectiles.push(new Projectile(player.x, player.y, velocity, player.damage));
            
            player.currentAmmo--; player.lastShotTime = now; updateAmmoDisplay();
        }

        const upgrades = [
            { name: '🔥 블래스터 강화', desc: '총알 데미지 강력하게 1 상승', apply: () => player.damage += 1 },
            { name: '📦 탄창 모듈', desc: '최대 탄창 수 +5', apply: () => { player.maxAmmo += 5; player.currentAmmo = player.maxAmmo; } },
            { name: '⚡ 연사 엔진', desc: '총알 발사 딜레이 감소', apply: () => player.fireDelay = Math.max(50, player.fireDelay - 40) },
            { name: '👟 추진기 오버클럭', desc: '기체 이동 속도 증가', apply: () => player.speed += 1.5 },
            { name: '💖 나노 수리', desc: '체력을 전부 회복합니다', apply: () => { player.health = player.maxHealth; updateHealth(); } }
        ];

        function triggerUpgrade() {
            isPaused = true;
            document.getElementById('upgradeModal').style.display = 'flex';
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            const shuffled = upgrades.sort(() => 0.5 - Math.random()).slice(0, 2);
            shuffled.forEach(card => {
                const div = document.createElement('div');
                div.className = 'upgrade-card';
                div.innerHTML = `<div class="card-title">${card.name}</div><div class="card-desc">${card.desc}</div>`;
                div.onclick = () => {
                    card.apply(); updateAmmoDisplay();
                    difficultyMultiplier += 0.25; 
                    document.getElementById('upgradeModal').style.display = 'none';
                    isPaused = false;
                };
                container.appendChild(div);
            });
        }

        function spawnBoss() {
            const warning = document.getElementById('bossWarning');
            warning.style.display = 'block'; setTimeout(() => { warning.style.display = 'none'; }, 3000);
            const hp = 50 * difficultyMultiplier; const radius = 60;
            const x = Math.random() < 0.5 ? -radius : canvas.width + radius; const y = Math.random() * canvas.height;
            const angle = Math.atan2(player.y - y, player.x - x);
            const velocity = { x: Math.cos(angle) * 1.5, y: Math.sin(angle) * 1.5 };
            enemies.push(new Enemy(x, y, radius, '#ff0055', velocity, hp, 'boss', true));
        }

        function spawnEnemies() {
            setInterval(() => {
                if (!gameActive || isPaused) return;
                const rand = Math.random();
                let r, c, vMult, hp, type;
                
                if (rand < 0.5) { r=20; c='#00f3ff'; vMult=2.5; hp=2; type='normal'; }
                else if (rand < 0.8) { r=12; c='#00ff88'; vMult=5.5; hp=1; type='fast'; }
                else { r=35; c='#8a2be2'; vMult=1.2; hp=6; type='tank'; }

                hp = Math.floor(hp * difficultyMultiplier); vMult = vMult * (1 + (difficultyMultiplier - 1) * 0.4);

                let x, y;
                if (Math.random() < 0.5) { x = Math.random() < 0.5 ? -r : canvas.width + r; y = Math.random() * canvas.height; } 
                else { x = Math.random() * canvas.width; y = Math.random() < 0.5 ? -r : canvas.height + r; }

                const angle = Math.atan2(player.y - y, player.x - x);
                const velocity = { x: Math.cos(angle) * vMult, y: Math.sin(angle) * vMult };
                enemies.push(new Enemy(x, y, r, c, velocity, hp, type));
            }, Math.max(400, 1000 - (difficultyMultiplier * 100)));
        }

        // --- 조작 세팅 (트윈 조이스틱 최적화) ---
        function setupJoystick(zoneId, knobId, callback) {
            const zone = document.getElementById(zoneId); const knob = document.getElementById(knobId);
            let active = false; let center = {x:0, y:0}; const maxR = 40;

            zone.addEventListener('touchstart', (e) => {
                e.preventDefault(); active = true;
                const rect = zone.getBoundingClientRect(); center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                moveKnob(e.changedTouches[0]);
            });
            zone.addEventListener('touchmove', (e) => { e.preventDefault(); if(active) moveKnob(e.changedTouches[0]); });
            zone.addEventListener('touchend', (e) => {
                e.preventDefault(); active = false; knob.style.transform = `translate(-50%, -50%)`;
                callback({x:0, y:0}, false);
            });

            function moveKnob(touch) {
                let dx = touch.clientX - center.x; let dy = touch.clientY - center.y;
                let dist = Math.hypot(dx, dy);
                if (dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
                knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                
                // 미세한 떨림 방지를 위한 데드존 설정 (10% 이하 입력 무시)
                let normalizedX = dx/maxR; let normalizedY = dy/maxR;
                if(Math.hypot(normalizedX, normalizedY) < 0.1) { normalizedX = 0; normalizedY = 0; }
                callback({ x: normalizedX, y: normalizedY }, true);
            }
        }

        let leftVector = {x:0, y:0}; let isLeftActive = false;
        let rightVector = {x:0, y:0}; let isRightActive = false;
        setupJoystick('joystick-left', 'knob-left', (v, a) => { leftVector = v; isLeftActive = a; });
        setupJoystick('joystick-right', 'knob-right', (v, a) => { rightVector = v; isRightActive = a; });

        const keys = { w: false, a: false, s: false, d: false };
        let isMouseDown = false; let mouseAngle = 0;
        
        window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 'r') reload(); keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
        window.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => { mouseAngle = Math.atan2(e.clientY - player.y, e.clientX - player.x); });

        function updateHealth() {
            let hpText = "HP: "; for(let i=0; i<player.health; i++) hpText += "❤️";
            document.getElementById('healthDisplay').innerText = hpText;
            if (player.health <= 0) {
                gameActive = false;
                document.getElementById('gameOverModal').style.display = 'flex';
                document.getElementById('finalScore').innerText = `최종 처치 수: ${score}`;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive || isPaused) return;

            ctx.fillStyle = 'rgba(3, 10, 18, 0.4)'; // 부드러운 잔상
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. 이동 처리 및 대각선 속도 정규화
            let moveX = 0, moveY = 0;
            if (keys.a) moveX -= 1; if (keys.d) moveX += 1;
            if (keys.w) moveY -= 1; if (keys.s) moveY += 1;
            
            if (moveX !== 0 || moveY !== 0) {
                const len = Math.hypot(moveX, moveY);
                moveX /= len; moveY /= len;
            }
            if (isLeftActive) { moveX = leftVector.x; moveY = leftVector.y; }

            if (player.x + moveX * player.speed > 20 && player.x + moveX * player.speed < canvas.width - 20) player.x += moveX * player.speed;
            if (player.y + moveY * player.speed > 20 && player.y + moveY * player.speed < canvas.height - 20) player.y += moveY * player.speed;

            // 2. 캐릭터 회전 방향 (우측 조이스틱 > 마우스 > 이동 방향)
            if (isRightActive && Math.hypot(rightVector.x, rightVector.y) > 0) {
                player.angle = Math.atan2(rightVector.y, rightVector.x);
            } else if (isMouseDown || Object.values(keys).some(v=>v)) {
                player.angle = mouseAngle;
            } else if (moveX !== 0 || moveY !== 0) {
                player.angle = Math.atan2(moveY, moveX);
            }

            player.draw();

            // 3. 발사 처리
            if (isRightActive || isMouseDown) shoot();

            // 4. 투사체
            projectiles.forEach((p, index) => {
                p.update();
                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) projectiles.splice(index, 1);
            });

            // 5. 적 충돌
            enemies.forEach((enemy, enemyIndex) => {
                enemy.update();

                if (Math.hypot(player.x - enemy.x, player.y - enemy.y) - enemy.radius - player.radius < 1) {
                    enemies.splice(enemyIndex, 1);
                    player.health -= enemy.isBoss ? 2 : 1; 
                    updateHealth();
                    ctx.fillStyle = 'rgba(255, 0, 85, 0.4)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                projectiles.forEach((p, pIndex) => {
                    if (Math.hypot(p.x - enemy.x, p.y - enemy.y) - enemy.radius - p.radius < 1) {
                        projectiles.splice(pIndex, 1);
                        enemy.health -= p.damage;

                        if (enemy.health <= 0) {
                            enemies.splice(enemyIndex, 1);
                            score += enemy.isBoss ? 5 : 1; 
                            document.getElementById('scoreDisplay').innerText = `처치: ${score}`;

                            if (score % 10 === 0 && score !== lastUpgradeScore && score % 30 !== 0) {
                                lastUpgradeScore = score; setTimeout(triggerUpgrade, 100);
                            }
                            if (score >= lastBossScore + 30) {
                                lastBossScore = score; lastUpgradeScore = score; spawnBoss();
                            }
                        }
                    }
                });
            });
        }

        function startGame() { gameActive = true; spawnEnemies(); animate(); }
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
