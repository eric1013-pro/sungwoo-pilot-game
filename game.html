<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>트릭이 키우기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&family=Orbitron:wght@400;700;900&display=swap');

        body {
            margin: 0; padding: 0;
            background-color: #000000;
            color: white;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 🎬 고급스러운 제작사 시네마틱 인트로 */
        #studioIntro {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 200;
            transition: opacity 1.5s ease-in-out;
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 400;
            letter-spacing: 20px;
            opacity: 0;
            animation: cinematicReveal 5s ease-in-out forwards;
        }
        .t-white { color: #aaaaaa; transition: 2s; }
        .t-e { color: #ffffff; text-shadow: 0 0 10px #fff, 0 0 30px #fff; font-weight: 900; }
        .t-3 { color: #ffffff; text-shadow: 0 0 10px #fff, 0 0 30px #fff; font-weight: 900; }
        
        @keyframes cinematicReveal {
            0% { opacity: 0; transform: scale(0.9); filter: blur(15px); letter-spacing: 5px; }
            30% { opacity: 1; filter: blur(0px); }
            70% { opacity: 1; filter: blur(0px); letter-spacing: 25px; }
            100% { opacity: 0; transform: scale(1.1); filter: blur(10px); letter-spacing: 30px; }
        }

        /* 🌌 메인 인트로 화면 */
        #introScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        
        .warp-active { animation: warpIn 1.2s cubic-bezier(0.7, 0, 0.3, 1) forwards !important; }
        @keyframes warpIn {
            0% { transform: scale(1); filter: blur(0px); opacity: 1; }
            50% { filter: blur(3px); opacity: 0.8; }
            100% { transform: scale(20); filter: blur(40px); opacity: 0; }
        }

        .donation-text {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            color: #aaaaaa; font-size: 1rem; font-weight: 700;
            animation: slowBlink 2s infinite; width: 100%; text-align: center;
        }
        @keyframes slowBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .intro-title {
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
            font-size: 4.5rem; color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            margin-bottom: 50px;
            animation: floatTitle 3s ease-in-out infinite;
        }
        @keyframes floatTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .btn-enter {
            background: transparent; color: #ffffff;
            font-size: 1.5rem; font-weight: 900; padding: 15px 50px;
            border: 2px solid #ffffff; border-radius: 5px;
            cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 3px;
        }
        .btn-enter:hover { background: #ffffff; color: #000; box-shadow: 0 0 30px #ffffff; }

        /* UI 레이어 */
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; display: none; }
        #scoreDisplay { font-size: 26px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        #healthDisplay { font-size: 22px; color: #ff0055; margin-top: 10px; }
        #ammoDisplay { font-size: 22px; color: #fff; font-weight: bold; margin-top: 10px; }

        #notificationUI {
            position: absolute; top: 25%; left: 50%; transform: translateX(-50%);
            color: #ffd700; font-size: 1.5rem; font-weight: 900; text-align: center;
            text-shadow: 0 0 15px #ffd700; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; z-index: 50;
        }

        #bossWarning {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            font-size: 3.5rem; font-weight: 900; color: #ff0055;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055;
            display: none; z-index: 20; animation: blink 0.5s infinite;
        }

        /* 📱 모바일 조이스틱 & 재장전 버튼 */
        .joystick-zone {
            position: absolute; bottom: 40px; width: 130px; height: 130px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; z-index: 15; display: none;
        }
        #joystick-left { left: 40px; }
        #joystick-right { right: 40px; }
        .joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.5); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        
        #mobileReloadBtn {
            position: absolute; bottom: 180px; right: 65px;
            background: rgba(255, 255, 255, 0.1); border: 2px solid #fff; color: #fff;
            width: 80px; height: 80px; border-radius: 50%;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            display: none; z-index: 15; text-align: center; line-height: 80px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        #mobileReloadBtn:active { background: rgba(255, 255, 255, 0.4); }

        /* 팝업 모달 */
        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 30;
        }
        .modal-content {
            background: #050505; padding: 40px; border-radius: 10px; border: 1px solid #fff;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2); text-align: center;
        }
        .modal h1 { color: #fff; font-family: 'Orbitron', sans-serif; font-size: 2.5rem; margin-top: 0; text-shadow: 0 0 15px #fff; }
        
        .card-container { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .upgrade-card {
            background: #111; border: 1px solid #fff; border-radius: 8px; padding: 20px;
            width: 180px; cursor: pointer; transition: 0.3s;
        }
        .upgrade-card:hover { transform: translateY(-10px); background: #fff; color: #000; box-shadow: 0 0 20px #fff; }
        .card-title { font-size: 20px; font-weight: 900; margin-bottom: 10px; }
        .card-desc { font-size: 14px; color: #aaa; }
        .upgrade-card:hover .card-desc { color: #222; }

        canvas { display: block; }
        
        @media (min-width: 800px) {
            .joystick-zone, #mobileReloadBtn { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- 🎵 배경 음악 플레이어 (GitHub에 bgm.mp3 파일을 올리면 자동 재생됩니다) -->
    <audio id="bgm" src="bgm.mp3" loop></audio>

    <!-- 🎬 제작사 인트로 -->
    <div id="studioIntro">
        <div class="logo-text">
            <span class="t-white">THR</span><span class="t-e">E</span><span class="t-3">3</span><span class="t-white">RIC</span>
        </div>
    </div>

    <!-- 🌌 메인 화면 -->
    <div id="introScreen" style="display: none;">
        <div class="donation-text">트릭이의 계좌로 자발적 후원을 해주세요<br>9003259257108 새마을 금고</div>
        <div class="intro-title">트릭이 키우기</div>
        <button class="btn-enter" onclick="triggerWarp()">START GAME</button>
    </div>

    <!-- 🎮 게임 UI -->
    <div id="ui-layer">
        <div id="scoreDisplay">처치: 0</div>
        <div id="healthDisplay">HP: ❤️❤️❤️</div>
        <div id="ammoDisplay">탄창: 30 / 30</div>
    </div>
    
    <!-- 💡 안내 툴팁 -->
    <div id="notificationUI"></div>
    <div id="bossWarning">⚠️ 보스몹 등장 ⚠️</div>

    <!-- 📱 모바일 전용 컨트롤러 -->
    <div id="joystick-left" class="joystick-zone"><div id="knob-left" class="joystick-knob"></div></div>
    <div id="joystick-right" class="joystick-zone"><div id="knob-right" class="joystick-knob"></div></div>
    <div id="mobileReloadBtn" onclick="reload()">RELOAD</div>

    <!-- 업그레이드 모달 -->
    <div id="upgradeModal" class="modal">
        <div class="modal-content">
            <h1>SYSTEM UPGRADE</h1>
            <p style="color: #aaa;">적들이 더욱 강해집니다. 파츠를 선택하세요.</p>
            <div class="card-container" id="cardContainer"></div>
        </div>
    </div>

    <!-- 게임 오버 모달 -->
    <div id="gameOverModal" class="modal">
        <div class="modal-content" style="border-color: #ff0055; box-shadow: 0 0 40px rgba(255, 0, 85, 0.4);">
            <h1 style="color: #ff0055; text-shadow: 0 0 20px #ff0055;">RESPAWN?</h1>
            <p id="finalScore" style="font-size: 24px; color: #fff;">최종 처치 수: 0</p>
            <button class="btn-enter" onclick="location.reload()" style="margin-top:20px; border-color:#ff0055; color:#ff0055;">재도전</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- 🎵 오디오 시스템 (웹 오디오 API 기반 효과음) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if(!audioCtx) audioCtx = new AudioContext();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            // 브금 재생 (bgm.mp3 파일이 같은 폴더에 있어야 작동함)
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.4;
            bgm.play().catch(e => console.log("BGM 파일(bgm.mp3)이 없거나 브라우저 정책에 의해 차단되었습니다."));
        }

        // 레이저 발사음
        function playShootSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime); // 볼륨 낮춤
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        // 타격음 (적격추)
        function playHitSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        // --- 툴팁(알림) ---
        let notiTimer;
        function showNotification(msg) {
            const noti = document.getElementById('notificationUI');
            noti.innerText = msg;
            noti.style.opacity = 1;
            clearTimeout(notiTimer);
            notiTimer = setTimeout(() => { noti.style.opacity = 0; }, 2500);
        }

        // --- 인트로 시퀀스 ---
        window.onload = () => {
            setTimeout(() => {
                const studio = document.getElementById('studioIntro');
                studio.style.opacity = '0';
                setTimeout(() => {
                    studio.style.display = 'none';
                    document.getElementById('introScreen').style.display = 'flex';
                }, 1500);
            }, 4000); 
        };

        function triggerWarp() {
            initAudio(); // 효과음 & BGM 시스템 가동

            const intro = document.getElementById('introScreen');
            intro.classList.add('warp-active');
            
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('ui-layer').style.display = 'block';
                if(window.innerWidth < 800) {
                    document.getElementById('joystick-left').style.display = 'block';
                    document.getElementById('joystick-right').style.display = 'block';
                    document.getElementById('mobileReloadBtn').style.display = 'block';
                }
                startGame();
            }, 1000); 
        }

        // --- 전역 변수 ---
        let score = 0, lastUpgradeScore = 0, lastBossScore = 0;
        let difficultyMultiplier = 1.0;
        let gameActive = false, isPaused = false, userHasMoved = false;

        // --- 🌌 배경 별빛 시스템 ---
        const stars = [];
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                r: Math.random() * 1.5, alpha: Math.random(), fade: (Math.random() * 0.02) + 0.005
            });
        }
        function drawStars() {
            stars.forEach(s => {
                s.alpha += s.fade;
                if(s.alpha >= 1 || s.alpha <= 0.1) s.fade *= -1;
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
            });
        }

        function drawPolygon(ctx, x, y, radius, sides, color, rotation) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(rotation);
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const angle = (i * 2 * Math.PI) / sides;
                ctx.lineTo(radius * Math.cos(angle), radius * Math.sin(angle));
            }
            ctx.closePath();
            ctx.fillStyle = color; ctx.shadowBlur = 10; ctx.shadowColor = color; ctx.fill();
            ctx.lineWidth = 1; ctx.strokeStyle = '#fff'; ctx.stroke();
            ctx.restore();
        }

        // --- 🚀 플레이어 기체 (탄창 30발, 데미지 0.5 밸런스 조정) ---
        class Player {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = 20;
                this.speed = 6; this.health = 3; this.maxHealth = 3;
                this.damage = 0.5; // 밸런스 패치: 기본 1.0 -> 0.5
                this.maxAmmo = 30; // 밸런스 패치: 기본 10 -> 30
                this.currentAmmo = 30;
                this.fireDelay = 150; // 연사 속도 약간 상향
                this.lastShotTime = 0; this.isReloading = false;
                this.angle = 0; 
                this.emptyTime = 0; 
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.beginPath();
                ctx.moveTo(this.radius * 1.2, 0); 
                ctx.lineTo(-this.radius * 0.8, this.radius * 0.8); 
                ctx.lineTo(-this.radius * 0.3, 0); 
                ctx.lineTo(-this.radius * 0.8, -this.radius * 0.8); 
                ctx.closePath();
                ctx.fillStyle = '#111'; ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = '#fff'; ctx.stroke();
                
                ctx.beginPath(); ctx.arc(-this.radius * 0.1, 0, this.radius * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = '#00f3ff'; ctx.shadowBlur = 15; ctx.shadowColor = '#00f3ff'; ctx.fill();
                ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y, velocity, damage) {
                this.x = x; this.y = y; this.radius = 4;
                this.velocity = velocity; this.damage = damage;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 10; ctx.shadowColor = '#fff'; ctx.fill();
            }
            update() { this.draw(); this.x += this.velocity.x; this.y += this.velocity.y; }
        }

        class Enemy {
            constructor(x, y, radius, color, velocity, health, type, isBoss = false) {
                this.x = x; this.y = y; this.radius = radius; this.color = color;
                this.velocity = velocity; this.health = health; this.maxHealth = health;
                this.type = type; this.isBoss = isBoss; this.rotation = 0;
            }
            draw() {
                this.rotation += 0.02; 
                if(this.isBoss) drawPolygon(ctx, this.x, this.y, this.radius, 8, this.color, -this.rotation); 
                else if(this.type === 'fast') drawPolygon(ctx, this.x, this.y, this.radius, 3, this.color, this.rotation); 
                else if(this.type === 'tank') drawPolygon(ctx, this.x, this.y, this.radius, 6, this.color, this.rotation); 
                else drawPolygon(ctx, this.x, this.y, this.radius, 4, this.color, this.rotation); 
                
                const barW = this.radius * 2; const barH = this.isBoss ? 8 : 4;
                const hpRatio = this.health / this.maxHealth;
                ctx.fillStyle = '#333'; ctx.fillRect(this.x - this.radius, this.y - this.radius - 15, barW, barH);
                ctx.fillStyle = hpRatio > 0.4 ? '#fff' : '#ff0055';
                ctx.fillRect(this.x - this.radius, this.y - this.radius - 15, barW * hpRatio, barH);
            }
            update() { this.draw(); this.x += this.velocity.x; this.y += this.velocity.y; }
        }

        const player = new Player(canvas.width / 2, canvas.height / 2);
        const projectiles = [];
        const enemies = [];

        // --- 🔧 스마트 재장전 ---
        function updateAmmoDisplay() {
            const display = document.getElementById('ammoDisplay');
            if (player.isReloading) { display.innerText = `장전 중...`; display.style.color = "#ff8c00"; }
            else { display.innerText = `탄창: ${player.currentAmmo} / ${player.maxAmmo}`; display.style.color = player.currentAmmo === 0 ? "#ff0055" : "#fff"; }
        }

        function reload() {
            if (player.isReloading || player.currentAmmo === player.maxAmmo) return;
            player.isReloading = true; updateAmmoDisplay();
            setTimeout(() => { player.currentAmmo = player.maxAmmo; player.isReloading = false; updateAmmoDisplay(); }, 1200);
        }

        function shoot() {
            if (!gameActive || isPaused) return;
            userHasMoved = true; 

            if (player.currentAmmo <= 0) { 
                if(!player.isReloading) showNotification(window.innerWidth < 800 ? "RELOAD 버튼을 누르세요!" : "탄창이 비었습니다! R키를 누르세요.");
                return; 
            }

            const now = Date.now();
            if (now - player.lastShotTime < player.fireDelay) return;
            
            const velocity = { x: Math.cos(player.angle) * 20, y: Math.sin(player.angle) * 20 };
            projectiles.push(new Projectile(player.x, player.y, velocity, player.damage));
            playShootSound(); // 발사 효과음
            
            player.currentAmmo--; player.lastShotTime = now; 
            updateAmmoDisplay();

            if(player.currentAmmo === 0) player.emptyTime = Date.now(); 
        }

        // --- 업그레이드 ---
        const upgrades = [
            { name: '🔥 블래스터 강화', desc: '데미지 0.5 상승', apply: () => player.damage += 0.5 },
            { name: '📦 탄창 모듈', desc: '최대 탄창 수 +15', apply: () => { player.maxAmmo += 15; player.currentAmmo = player.maxAmmo; } },
            { name: '⚡ 연사 엔진', desc: '발사 딜레이 감소', apply: () => player.fireDelay = Math.max(50, player.fireDelay - 30) },
            { name: '👟 추진기 오버클럭', desc: '이동 속도 증가', apply: () => player.speed += 1.5 },
            { name: '💖 나노 수리', desc: '체력을 전부 회복합니다', apply: () => { player.health = player.maxHealth; updateHealth(); } }
        ];

        function triggerUpgrade() {
            isPaused = true; document.getElementById('upgradeModal').style.display = 'flex';
            const container = document.getElementById('cardContainer'); container.innerHTML = '';
            const shuffled = upgrades.sort(() => 0.5 - Math.random()).slice(0, 2);
            shuffled.forEach(card => {
                const div = document.createElement('div'); div.className = 'upgrade-card';
                div.innerHTML = `<div class="card-title">${card.name}</div><div class="card-desc">${card.desc}</div>`;
                div.onclick = () => {
                    card.apply(); updateAmmoDisplay(); difficultyMultiplier += 0.2; 
                    document.getElementById('upgradeModal').style.display = 'none'; isPaused = false;
                };
                container.appendChild(div);
            });
        }

        function spawnBoss() {
            const warning = document.getElementById('bossWarning');
            warning.style.display = 'block'; setTimeout(() => { warning.style.display = 'none'; }, 3000);
            const hp = 50 * difficultyMultiplier; const radius = 60;
            const x = Math.random() < 0.5 ? -radius : canvas.width + radius; const y = Math.random() * canvas.height;
            const angle = Math.atan2(player.y - y, player.x - x);
            const velocity = { x: Math.cos(angle) * 1.5, y: Math.sin(angle) * 1.5 };
            enemies.push(new Enemy(x, y, radius, '#ff0055', velocity, hp, 'boss', true));
        }

        function spawnEnemies() {
            setInterval(() => {
                if (!gameActive || isPaused) return;
                const rand = Math.random(); let r, c, vMult, hp, type;
                if (rand < 0.5) { r=20; c='#fff'; vMult=2.5; hp=2; type='normal'; }
                else if (rand < 0.8) { r=12; c='#00f3ff'; vMult=5.5; hp=1; type='fast'; }
                else { r=35; c='#ff8c00'; vMult=1.2; hp=6; type='tank'; }

                hp = Math.floor(hp * difficultyMultiplier); vMult = vMult * (1 + (difficultyMultiplier - 1) * 0.4);
                let x, y;
                if (Math.random() < 0.5) { x = Math.random() < 0.5 ? -r : canvas.width + r; y = Math.random() * canvas.height; } 
                else { x = Math.random() * canvas.width; y = Math.random() < 0.5 ? -r : canvas.height + r; }

                const angle = Math.atan2(player.y - y, player.x - x);
                const velocity = { x: Math.cos(angle) * vMult, y: Math.sin(angle) * vMult };
                enemies.push(new Enemy(x, y, r, c, velocity, hp, type));
            }, Math.max(400, 1000 - (difficultyMultiplier * 100)));
        }

        // --- 조작 세팅 ---
        function setupJoystick(zoneId, knobId, callback) {
            const zone = document.getElementById(zoneId); const knob = document.getElementById(knobId);
            let active = false; let center = {x:0, y:0}; const maxR = 40;

            zone.addEventListener('touchstart', (e) => {
                e.preventDefault(); active = true; userHasMoved = true;
                const rect = zone.getBoundingClientRect(); center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                moveKnob(e.changedTouches[0]);
            });
            zone.addEventListener('touchmove', (e) => { e.preventDefault(); if(active) moveKnob(e.changedTouches[0]); });
            zone.addEventListener('touchend', (e) => { e.preventDefault(); active = false; knob.style.transform = `translate(-50%, -50%)`; callback({x:0, y:0}, false); });

            function moveKnob(touch) {
                let dx = touch.clientX - center.x; let dy = touch.clientY - center.y; let dist = Math.hypot(dx, dy);
                if (dist > maxR) { dx = (dx/dist)*maxR; dy = (dy/dist)*maxR; }
                knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                let nX = dx/maxR; let nY = dy/maxR; if(Math.hypot(nX, nY) < 0.1) { nX = 0; nY = 0; }
                callback({ x: nX, y: nY }, true);
            }
        }

        let leftVector = {x:0, y:0}; let isLeftActive = false;
        let rightVector = {x:0, y:0}; let isRightActive = false;
        setupJoystick('joystick-left', 'knob-left', (v, a) => { leftVector = v; isLeftActive = a; });
        setupJoystick('joystick-right', 'knob-right', (v, a) => { rightVector = v; isRightActive = a; });

        const keys = { w: false, a: false, s: false, d: false };
        let isMouseDown = false; let mouseAngle = 0;
        
        window.addEventListener('keydown', (e) => { 
            if(e.key.toLowerCase() === 'r') reload(); 
            if(keys.hasOwnProperty(e.key.toLowerCase())) { keys[e.key.toLowerCase()] = true; userHasMoved = true; }
        });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
        window.addEventListener('mousedown', () => { isMouseDown = true; userHasMoved = true; });
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => { mouseAngle = Math.atan2(e.clientY - player.y, e.clientX - player.x); });

        function updateHealth() {
            let hpText = "HP: "; for(let i=0; i<player.health; i++) hpText += "❤️";
            document.getElementById('healthDisplay').innerText = hpText;
            if (player.health <= 0) {
                gameActive = false; document.getElementById('gameOverModal').style.display = 'flex';
                document.getElementById('finalScore').innerText = `최종 처치 수: ${score}`;
            }
        }

        // --- 메인 루프 ---
        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive || isPaused) return;

            // 1. 뿌옇게 변하는 현상 완벽 해결 (캔버스를 검정색으로 매번 완전 초기화)
            ctx.fillStyle = '#000000'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawStars();

            // 💡 자동 재장전 시스템
            if (player.currentAmmo === 0 && !player.isReloading) {
                if (Date.now() - player.emptyTime > 3000) {
                    showNotification("자동 재장전 시스템 가동...");
                    reload();
                }
            }

            let moveX = 0, moveY = 0;
            if (keys.a) moveX -= 1; if (keys.d) moveX += 1;
            if (keys.w) moveY -= 1; if (keys.s) moveY += 1;
            
            if (moveX !== 0 || moveY !== 0) { const len = Math.hypot(moveX, moveY); moveX /= len; moveY /= len; }
            if (isLeftActive) { moveX = leftVector.x; moveY = leftVector.y; }

            if (player.x + moveX * player.speed > 20 && player.x + moveX * player.speed < canvas.width - 20) player.x += moveX * player.speed;
            if (player.y + moveY * player.speed > 20 && player.y + moveY * player.speed < canvas.height - 20) player.y += moveY * player.speed;

            if (isRightActive && Math.hypot(rightVector.x, rightVector.y) > 0) player.angle = Math.atan2(rightVector.y, rightVector.x);
            else if (isMouseDown || Object.values(keys).some(v=>v)) player.angle = mouseAngle;
            else if (moveX !== 0 || moveY !== 0) player.angle = Math.atan2(moveY, moveX);

            player.draw();

            if (isRightActive || isMouseDown) shoot();

            projectiles.forEach((p, index) => {
                p.update(); if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) projectiles.splice(index, 1);
            });

            enemies.forEach((enemy, enemyIndex) => {
                enemy.update();
                if (Math.hypot(player.x - enemy.x, player.y - enemy.y) - enemy.radius - player.radius < 1) {
                    enemies.splice(enemyIndex, 1); player.health -= enemy.isBoss ? 2 : 1; 
                    playHitSound(); updateHealth(); 
                    ctx.fillStyle = 'rgba(255, 0, 85, 0.4)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                projectiles.forEach((p, pIndex) => {
                    if (Math.hypot(p.x - enemy.x, p.y - enemy.y) - enemy.radius - p.radius < 1) {
                        projectiles.splice(pIndex, 1); enemy.health -= p.damage;
                        if (enemy.health <= 0) {
                            playHitSound(); // 타격 효과음
                            enemies.splice(enemyIndex, 1); score += enemy.isBoss ? 5 : 1; 
                            document.getElementById('scoreDisplay').innerText = `처치: ${score}`;
                            if (score % 10 === 0 && score !== lastUpgradeScore && score % 30 !== 0) {
                                lastUpgradeScore = score; setTimeout(triggerUpgrade, 100);
                            }
                            if (score >= lastBossScore + 30) {
                                lastBossScore = score; lastUpgradeScore = score; spawnBoss();
                            }
                        }
                    }
                });
            });
        }

        function startGame() { 
            gameActive = true; spawnEnemies(); animate(); 
            // 💡 초보자 튜토리얼
            setTimeout(() => {
                if(!userHasMoved) showNotification(window.innerWidth < 800 ? "조이스틱을 조작하고 RELOAD로 장전하세요!" : "WASD 이동, 마우스 공격, R키 장전!");
            }, 4000);
        }
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
